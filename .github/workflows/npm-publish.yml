name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      python-version: '3.10'
      node-version: 'v18.16.0'

  npm-publish:
    name: Upload release to NPM
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      id-token: write
      contents: read
    needs: build
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'v18.16.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: npm-dist/
      - name: Publish to npm
        run: |
          pushd npm-dist
          FILE=$(echo *.tgz)
          npm publish "$FILE" --provenance --access public
          popd
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
